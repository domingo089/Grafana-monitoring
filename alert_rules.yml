groups:
- name: server-alerts
  rules:

  - alert: HighCPU
    expr: 100 - (avg by(instance)(irate(node_cpu_seconds_total{mode="idle"}[1m])) * 100) > 80
    for: 1m
    annotations:
      summary: "CPU alta detectada"

  - alert: ServerDown
    expr: up == 0
    for: 30s
    annotations:
      summary: "Servidor caído"
